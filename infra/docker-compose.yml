services:
  backend:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../linkauto-backend:/workspace
    env_file:
      - ../linkauto-backend/.env.example
    command: >
      sh -c "pip install --no-cache-dir -e . &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../linkauto-frontend:/workspace
    env_file:
      - ../linkauto-frontend/.env.example
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
